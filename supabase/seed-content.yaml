# Fill this in with your real content, then it gets turned into
# supabase/seed.sql (see docs/08-seed-data.md for the full process).
#
# How to use:
#   1. Replace every <placeholder> below with your real content.
#   2. Duplicate the example project/post blocks for each additional one —
#      each is a "- " list item, just copy the whole block including the
#      leading "- ".
#   3. Delete any block you don't want seeded (e.g. leave `posts: []` if you
#      don't want blog content seeded yet).
#   4. Hand this back and it gets converted into supabase/seed.sql.
#
# Field notes:
#   - "slug" must be unique per project/post, URL-safe (lowercase,
#     hyphens, no spaces) — it's what the public URL is built from
#     (e.g. /projects/<slug>).
#   - "featured"/"published" are true/false. Unpublished projects/posts
#     exist in the database but are never returned by the public API
#     (only visible to you in the admin UI) — useful for drafts.
#   - Multi-line text (summary, content, bio) can use the `|` block style
#     shown below — just keep every line indented the same amount.
#   - image_url should be a real, reachable image URL (Unsplash is what
#     the rest of the site uses — see frontend/src/data/content.ts for the
#     pattern) or leave it as a placeholder and swap it later.
#
# Filled in below from docs/assets/docs/JannaLomibaoCV.pdf. A few notes on
# how the CV mapped onto this schema, worth reading before you send it back:
#   - Fixed a few obvious CV typos when transcribing (Concordia "Universit"
#     -> "University", "NetJS" -> "NestJS", "Firebas. e" -> "Firebase") —
#     didn't touch anything you'd typed yourself in this file already
#     (name/email/github/linkedin), only tidied "Software Developper" ->
#     "Software Developer" and the missing space in "Montreal,Canada".
#   - image_url/repo_url/demo_url aren't in the CV at all — every project
#     below has a placeholder Unsplash image (same style already used in
#     frontend/src/data/content.ts) and blank repo/demo links. Swap in real
#     screenshots and links before this goes live.
#   - No quantified outcomes in the CV (no "reduced X by Y%" type metrics)
#     — didn't invent any. Each project's "outcome" below just restates
#     what was actually shipped, per the CV's own bullets.
#   - resume.experience is filled from the CV's literal "Work Experience"
#     section (Food Festival All-Rounder, etc.) — none of those are
#     technical roles, and the CV gives no bullet points for any of them,
#     so "points" is left empty below rather than invented. The CV's
#     "Robotics Club – Website Developer" entry (built the CRC Robotics
#     Competition site in Vue.js) is technical and arguably belongs here
#     instead/as well — left as a commented-out block so you can decide,
#     not added silently.

